[tool.ruff]
target-version = "py311"
line-length = 100
exclude = ["vendor/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: full-pipeline tests that load real ML models (slower)",
]
